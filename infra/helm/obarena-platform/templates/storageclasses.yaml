{{- if .Values.storage.createStorageClasses }}
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: obarena-longhorn-ephemeral
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  # MANAGED BY values.yaml under `storage.replicaCount`. 
  # Set to "1" for dev box, or increase to "2" or "3" for multi-node durability.
  numberOfReplicas: "{{ .Values.storage.replicaCount | default 1 }}"
  staleReplicaTimeout: "30"
  fsType: "ext4"
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: obarena-longhorn-db
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  # MANAGED BY values.yaml under `storage.replicaCount`.
  # Set to "1" for dev box, or increase to "2" or "3" for multi-node durability.
  numberOfReplicas: "{{ .Values.storage.replicaCount | default 1 }}"
  staleReplicaTimeout: "30"
  fsType: "ext4"
{{- end }}
