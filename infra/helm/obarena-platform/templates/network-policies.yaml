# seaweedfs: ingress from submission-api, build-service, sandbox-orchestrator,
# sandbox InitContainers, and kubelet probes
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: seaweedfs-ingress
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
  ingress:
    # Kubelet readiness/liveness probes
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
            - port: "9333"
              protocol: TCP
    # seaweedfs-init Job — bucket creation and status check
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: seaweedfs-init
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
            - port: "9333"
              protocol: TCP
    # submission-api — presigned URL generation
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: submission-api
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
    # build-service — source download + binary upload
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: build-service
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
    # sandbox-orchestrator — presigned URL generation for InitContainer
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: sandbox-orchestrator
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
    # sandbox InitContainer — binary download
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: sandboxes
            app.kubernetes.io/name: sandbox
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
    # build pods — pre-signed URL source download + binary upload
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: builds
            app.kubernetes.io/name: build
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP
---
