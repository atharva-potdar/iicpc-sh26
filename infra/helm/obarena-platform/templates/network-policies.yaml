# redpanda: ingress from platform services, KEDA, bot-runner Jobs, and kubelet probes
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: redpanda-ingress
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: redpanda
  ingress:
    # Kubelet readiness/liveness probes
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP
            - port: "9644"
              protocol: TCP
    # All platform services — produce/consume
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP
            - port: "9644"
              protocol: TCP
    # KEDA operator — consumer lag polling for ScaledObjects
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: keda
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP
    # bot-runner Jobs — publish bot.metrics from bots namespace
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: bots
            app.kubernetes.io/name: bot-runner
      toPorts:
        - ports:
            - port: "9092"
              protocol: TCP

# ─── BUILDS NAMESPACE ─────────────────────────────────────────────────────────

---
# builds: default deny all direct pod-to-pod traffic.
# Build pods access SeaweedFS via pre-signed URLs through the policy below.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: builds-default-deny
  namespace: builds
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
# build pods: egress to SeaweedFS (pre-signed URL download/upload) + DNS only
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: builds-policy
  namespace: builds
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: build
  ingress: []
  egress:
    # DNS — needed for InitContainer/main container to resolve SeaweedFS hostname in pre-signed URL
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # SeaweedFS — pre-signed URL source download + binary upload
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: seaweedfs
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP

# ─── SANDBOXES NAMESPACE ──────────────────────────────────────────────────────

---
# sandboxes: default deny all
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sandboxes-default-deny
  namespace: sandboxes
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
# sandbox pods: ingress from bot-runner + kubelet probes, egress to SeaweedFS + DNS
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: sandboxes-policy
  namespace: sandboxes
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: sandbox
  ingress:
    # bot-runner Jobs — WebSocket load test traffic
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: bots
            app.kubernetes.io/name: bot-runner
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Kubelet readiness probe — sandbox-orchestrator blocks on Ready before publishing sandbox.ready
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    # DNS — needed for InitContainer wget to resolve SeaweedFS hostname
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # SeaweedFS — InitContainer binary download only
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: platform
            app.kubernetes.io/name: seaweedfs
      toPorts:
        - ports:
            - port: "8333"
              protocol: TCP

