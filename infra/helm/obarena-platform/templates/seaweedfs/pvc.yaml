apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-data
  namespace: platform
  labels:
    {{- include "obarena.labels" . | nindent 4 }}
spec:
  accessModes: [ReadWriteOnce]
  {{- $sc := .Values.storage.seaweedfsStorageClass | default .Values.storage.className }}
  {{- if $sc }}
  storageClassName: {{ $sc | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.seaweedfs.size }}
