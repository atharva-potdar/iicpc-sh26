apiVersion: apps/v1
kind: Deployment
metadata:
  name: leaderboard-ws
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: leaderboard-ws
  template:
    metadata:
      labels:
        app: leaderboard-ws
    spec:
      containers:
        - name: leaderboard-ws
          image: leaderboard-ws:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8090
          env:
            - name: REDIS_ADDR
              value: "redis.platform.svc.cluster.local:6379"
            - name: PORT
              value: "8090"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: 32Mi
              cpu: "50m"
            limits:
              memory: 64Mi
              cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: leaderboard-ws
  namespace: platform
spec:
  type: NodePort
  selector:
    app: leaderboard-ws
  ports:
    - name: http
      port: 8090
      targetPort: 8090
      nodePort: 30090
