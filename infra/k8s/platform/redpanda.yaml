apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:v26.1.6
          command:
            - rpk
            - redpanda
            - start
            - --mode=dev-container
            - --smp=1
            - --memory=512M
            - --overprovisioned
            - --kafka-addr=0.0.0.0:9092
            - --advertise-kafka-addr=redpanda.platform.svc.cluster.local:9092
            - --pandaproxy-addr=0.0.0.0:8082
            - --schema-registry-addr=0.0.0.0:8081
          ports:
            - name: kafka
              containerPort: 9092
            - name: admin
              containerPort: 9644
            - name: http-proxy
              containerPort: 8082
            - name: schema-registry
              containerPort: 8081
          resources:
            requests:
              memory: 512Mi
              cpu: "500m"
            limits:
              memory: 1Gi
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /v1/status/ready
              port: 9644
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: platform
spec:
  selector:
    app: redpanda
  ports:
    - name: kafka
      port: 9092
    - name: admin
      port: 9644
    - name: http-proxy
      port: 8082
    - name: schema-registry
      port: 8081
